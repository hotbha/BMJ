name: Local Docker Config
version: 0.0.1
schema: v1
models:
  - name: Local Qwen (Docker)
    provider: openai
    model: ai/qwen3-coder
    contextLength: 16384
    contextWindow: 16384
    completionOptions: 
      temperature: 0.1    # Lower for more precise code generation
    apiBase: http://localhost:12434/v1
    roles:
      - chat
      - edit
      - autocomplete