# ============================================================
# DEVELOPMENT GUARDRAILS - CHARGEBEE MCP INTEGRATION
# ============================================================
# Critical: Use Chargebee MCP in VSCode to understand Chargebee
# ============================================================

development_guardrails:
  Chargebee_MCP_Usage: |
    MANDATORY: Use Chargebee MCP (Model Context Protocol) in VSCode for:
    - Understanding Chargebee architecture
    - Accessing Chargebee API documentation
    - Testing Chargebee API calls
    - Debugging Chargebee integration issues
    - Creating webhooks and understanding webhook payloads
    
    Why: Most functionalities are managed by Chargebee, not custom-built.
    
  Chargebee_Managed_Features: |
    The following are MANAGED BY CHARGEBEE (not custom-built):
    
    1. Checkout Page
       - Flutter app ONLY calls checkout URL
       - Provides: customer_id, items, pricing
       - Chargebee handles: Payment UI, payment processing, invoices
    
    2. Subscription Management
       - Flutter app ONLY calls subscription URL
       - Chargebee handles: Plan selection, billing cycles, proration
    
    3. Customer Portal
       - Flutter app ONLY redirects to portal URL
       - Chargebee handles: Subscription updates, payment method updates
    
    4. Payment Processing
       - Flutter app NEVER handles payment details
       - Chargebee handles: PCI compliance, payment gateways, fraud detection
    
    5. Invoicing
       - Flutter app ONLY displays invoice data from local cache
       - Chargebee handles: Invoice generation, tax calculation, delivery
    
  bmjServer_Responsibilities: |
    The bmjServer ONLY manages:
    
    1. Authentication
       - User signup/login
       - JWT token generation
       - Session management
    
    2. Chargebee Integration
       - Create hosted page URLs (checkout, subscription, portal)
       - Sync data from Chargebee (webhooks + batch sync)
       - Cache Chargebee data locally (fast reads)
    
    3. Local Cache
       - Products, plans, prices (from Chargebee)
       - Subscriptions, invoices, orders (from Chargebee)
       - Customer billing details (from Chargebee)
    
  Flutter_App_Responsibilities: |
    The Flutter app ONLY:
    
    1. Displays Data
       - Fetch from bmjServer local cache (fast)
       - NEVER call Chargebee API directly
    
    2. Redirects to Chargebee
       - Checkout: Call /api/test/cartCheckout → Get URL → Open WebView
       - Subscription: Call /api/test/generate_pricing_page_session_url → Get URL → Open WebView
       - Portal: Call /api/test/portal → Get URL → Open WebView
    
    3. Local State Management
       - Cart management (local storage)
       - User session (JWT tokens)
       - UI state (BLoC pattern)
    
  Development_Workflow: |
    When implementing ANY Chargebee-related feature:
    
    1. Use Chargebee MCP in VSCode
       - Ask: "How does Chargebee handle [feature]?"
       - Ask: "What API endpoint for [operation]?"
       - Ask: "What webhook events for [scenario]?"
    
    2. Check Chargebee Documentation
       - API Reference: https://www.chargebee.com/docs/2.0/api.html
       - Webhooks: https://www.chargebee.com/docs/2.0/webhooks.html
    
    3. Test in Chargebee Test Site
       - Site: bookmyjuice-test
       - NEVER test on production site
    
    4. Implement bmjServer Endpoint
       - Call Chargebee API
       - Return URL or data to Flutter app
    
    5. Implement Flutter Redirect
       - Call bmjServer endpoint
       - Open URL in WebView or external browser
    
    6. Handle Webhooks
       - Chargebee → Webhook → bmjServer → Update local cache

