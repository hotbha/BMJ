  # ============================================================
  # DATA VALIDATION RULES
  # ============================================================
  validation_rules:
    
    email:
      format: "RFC 5322 compliant"
      regex: "^[\\w-\\.]+@([\\w-]+\\.)+[\\w-]{2,4}$"
      max_length: 100
      required: true
      unique: true
      verification: "6-digit code required"

    phone:
      format: "10-digit Indian number"
      regex: "^[6-9]\\d{9}$"
      max_length: 10
      required: true
      unique: true
      verification: "6-digit OTP required"

    password:
      min_length: 8
      max_length: 40
      require_uppercase: true
      require_lowercase: true
      require_numbers: 2
      require_special: true
      no_spaces: true
      no_control_chars: true

    first_name:
      max_length: 50
      required: true
      allowed_chars: "Letters, spaces, hyphens"

    last_name:
      max_length: 50
      required: true
      allowed_chars: "Letters, spaces, hyphens"

    address_line1:
      label: "Flat/House No."
      max_length: 120
      required: true

    address_line2:
      label: "Society/Locality"
      max_length: 120
      required: true

    address_line3:
      label: "Sector/Area"
      max_length: 120
      required: true

    city:
      max_length: 120
      required: true

    state:
      max_length: 120
      required: true

    zip:
      format: "6-digit Indian PIN"
      regex: "^\\d{6}$"
      required: true

    country:
      format: "ISO 3166-1 alpha-2"
      length: 2
      default: "IN"
      required: true

