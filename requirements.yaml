# ============================================================
# UNIFIED SIGNUP FLOW - COMPLETE DOCUMENTATION
# ============================================================
# Version: 3.0.0
# Last Updated: 2026-03-29
# ============================================================

unified_signup_flow:
  
  # ============================================================
  # BUSINESS REQUIREMENTS
  # ============================================================
  business_requirements:
    BR-AUTH-001:
      title: "Mandatory Email Collection"
      description: "All users must provide a verified email address for account creation, regardless of signup method (Email, Phone, or Google)"
      priority: P0
      rationale: "Email is required for order confirmations, subscription notifications, and account recovery"

    BR-AUTH-002:
      title: "Mandatory Phone Collection"
      description: "All users must provide a verified phone number for account creation"
      priority: P0
      rationale: "Phone is required for delivery coordination, OTP-based order confirmations, and customer support"

    BR-AUTH-003:
      title: "Mandatory Address Collection"
      description: "All users must provide complete delivery address before account creation"
      priority: P0
      rationale: "Address is required for delivery feasibility check and order fulfillment"

    BR-AUTH-004:
      title: "Multiple Signup Entry Points"
      description: "Users must be able to start signup via Email, Phone, or Google"
      priority: P0
      rationale: "Accommodates user preferences and increases conversion rates"

    BR-AUTH-005:
      title: "Email Verification"
      description: "Email addresses must be verified via 6-digit code before account creation"
      priority: P0
      rationale: "Prevents fake accounts and ensures deliverability"

    BR-AUTH-006:
      title: "Phone Verification"
      description: "Phone numbers must be verified via 6-digit OTP before account creation"
      priority: P0
      rationale: "Prevents fraud and ensures valid contact information"

    BR-AUTH-007:
      title: "Google Sign-In Integration"
      description: "Google signup provides pre-verified email; phone verification still required"
      priority: P0
      rationale: "Streamlines signup while maintaining security standards"

    BR-AUTH-008:
      title: "Strong Password Policy"
      description: "Passwords must meet security requirements (8+ chars, uppercase, lowercase, number, special char)"
      priority: P0
      rationale: "Protects user accounts and sensitive data"

  # ============================================================
  # FUNCTIONAL REQUIREMENTS
  # ============================================================
  functional_requirements:
    
    FR-AUTH-001:
      title: "Signup Method Selection"
      description: "System shall present three signup options: Email, Phone, and Google"
      acceptance_criteria:
        - "User sees three clearly labeled signup buttons"
        - "Each button displays appropriate icon and description"
        - "User can tap any option to begin that flow"
      status: implemented

    FR-AUTH-002:
      title: "Email-First Signup Flow"
      description: "Users starting with email shall complete: Email → Verify Email → Phone → Verify OTP → Address → Password"
      acceptance_criteria:
        - "User enters valid email address"
        - "System sends 6-digit verification code to email"
        - "User enters correct code to verify email"
        - "User enters valid 10-digit phone number"
        - "System sends 6-digit OTP to phone"
        - "User enters correct OTP to verify phone"
        - "User enters complete address details"
        - "User creates password meeting requirements"
        - "Account is created with all verified information"
      status: implemented

    FR-AUTH-003:
      title: "Phone-First Signup Flow"
      description: "Users starting with phone shall complete: Phone → Verify OTP → Email → Verify Email → Address → Password"
      acceptance_criteria:
        - "User enters valid 10-digit phone number"
        - "System sends 6-digit OTP to phone"
        - "User enters correct OTP to verify phone"
        - "User enters valid email address"
        - "System sends 6-digit verification code to email"
        - "User enters correct code to verify email"
        - "User enters complete address details"
        - "User creates password meeting requirements"
        - "Account is created with all verified information"
      status: implemented

    FR-AUTH-004:
      title: "Google Signup Flow"
      description: "Google signup users shall complete: Google Auth → Phone → Verify OTP → Address → Password"
      acceptance_criteria:
        - "User taps 'Sign up with Google'"
        - "Google authentication provides verified email, name, and picture"
        - "System displays pre-filled email (read-only)"
        - "User enters valid 10-digit phone number"
        - "System sends 6-digit OTP to phone"
        - "User enters correct OTP to verify phone"
        - "User enters complete address details"
        - "User creates password meeting requirements"
        - "Account is created with Google email and verified phone"
      status: implemented

    FR-AUTH-005:
      title: "Email Verification Code"
      description: "System shall generate and send 6-digit verification codes via email"
      acceptance_criteria:
        - "Code is exactly 6 digits"
        - "Code expires after 10 minutes"
        - "Code can only be used once"
        - "User can request code resend after 30 seconds"
        - "Code is logged to console in development mode"
      status: implemented

    FR-AUTH-006:
      title: "Phone OTP Verification"
      description: "System shall generate and send 6-digit OTP via SMS"
      acceptance_criteria:
        - "OTP is exactly 6 digits"
        - "OTP expires after 10 minutes"
        - "OTP can only be used once"
        - "User can request OTP resend after 30 seconds"
        - "OTP is logged to console in development mode"
      status: implemented

    FR-AUTH-007:
      title: "Address Collection"
      description: "System shall collect complete delivery address with validation"
      acceptance_criteria:
        - "First Name: required, max 50 chars"
        - "Last Name: required, max 50 chars"
        - "Flat/House No: required, max 120 chars"
        - "Society/Locality: required, max 120 chars"
        - "Sector/Area: required, max 120 chars"
        - "City: required, max 120 chars"
        - "State: required, max 120 chars"
        - "ZIP Code: required, exactly 6 digits"
        - "Country: required, 2-letter code (default: IN)"
      status: implemented

    FR-AUTH-008:
      title: "Password Creation"
      description: "System shall enforce strong password policy"
      acceptance_criteria:
        - "Minimum 8 characters"
        - "At least 1 uppercase letter"
        - "At least 1 lowercase letter"
        - "At least 2 numbers"
        - "At least 1 special character"
        - "Maximum 40 characters"
        - "No spaces allowed"
        - "Real-time password strength indicator"
      status: implemented

    FR-AUTH-009:
      title: "Unified Signup API"
      description: "Backend shall provide /api/auth/unified-signup endpoint"
      acceptance_criteria:
        - "Accepts email, phone, password, and address"
        - "Validates all required fields"
        - "Creates user in local database with BCrypt password"
        - "Creates customer in Chargebee"
        - "Returns success message or error details"
      status: implemented

  # ============================================================
  # USE CASES
  # ============================================================
  use_cases:
    
    UC-AUTH-001:
      title: "Email-First Signup"
      actor: "New User"
      precondition: "User has valid email address and phone number"
      main_flow:
        - "User opens app and sees login/signup screen"
        - "User taps 'Sign up with Email'"
        - "System displays email entry screen"
        - "User enters email address and taps 'Continue'"
        - "System sends 6-digit verification code to email"
        - "System displays code entry screen"
        - "User enters 6-digit code and taps 'Verify Email'"
        - "System validates code and displays phone entry screen"
        - "User enters 10-digit phone number and taps 'Send OTP'"
        - "System sends 6-digit OTP to phone"
        - "System displays OTP entry screen"
        - "User enters 6-digit OTP and taps 'Verify OTP'"
        - "System validates OTP and displays address entry screen"
        - "User enters all address fields and taps 'Continue'"
        - "System displays password creation screen"
        - "User enters password twice and taps 'Create Account'"
        - "System creates account and logs user in"
        - "System navigates to dashboard"
      alternate_flows:
        - "A1: Invalid email format - System shows error, user re-enters"
        - "A2: Email already registered - System shows error, user can login"
        - "A3: Wrong verification code - System shows error, user retries"
        - "A4: Code expired - User taps 'Resend Code', new code sent"
        - "A5: Invalid phone format - System shows error, user re-enters"
        - "A6: Wrong OTP - System shows error, user retries"
        - "A7: Weak password - System shows requirements, user re-enters"
      postcondition: "User account created with verified email, verified phone, and address"

    UC-AUTH-002:
      title: "Phone-First Signup"
      actor: "New User"
      precondition: "User has valid phone number and email address"
      main_flow:
        - "User opens app and sees login/signup screen"
        - "User taps 'Sign up with Phone'"
        - "System displays phone entry screen"
        - "User enters 10-digit phone number and taps 'Send OTP'"
        - "System sends 6-digit OTP to phone"
        - "System displays OTP entry screen"
        - "User enters 6-digit OTP and taps 'Verify OTP'"
        - "System validates OTP and displays email entry screen"
        - "User enters email address and taps 'Continue'"
        - "System sends 6-digit verification code to email"
        - "System displays code entry screen"
        - "User enters 6-digit code and taps 'Verify Email'"
        - "System validates code and displays address entry screen"
        - "User enters all address fields and taps 'Continue'"
        - "System displays password creation screen"
        - "User enters password twice and taps 'Create Account'"
        - "System creates account and logs user in"
        - "System navigates to dashboard"
      alternate_flows:
        - "A1: Invalid phone format - System shows error, user re-enters"
        - "A2: Phone already registered - System shows error, user can login"
        - "A3: Wrong OTP - System shows error, user retries"
        - "A4: OTP expired - User taps 'Resend OTP', new OTP sent"
        - "A5: Invalid email format - System shows error, user re-enters"
        - "A6: Wrong verification code - System shows error, user retries"
      postcondition: "User account created with verified phone, verified email, and address"

    UC-AUTH-003:
      title: "Google Signup"
      actor: "New User with Google Account"
      precondition: "User has valid Google account and phone number"
      main_flow:
        - "User opens app and sees login/signup screen"
        - "User taps 'Sign up with Google'"
        - "System opens Google authentication"
        - "User selects Google account"
        - "Google returns verified email, name, and picture"
        - "System displays phone entry screen with pre-filled email (read-only)"
        - "User enters 10-digit phone number and taps 'Send OTP'"
        - "System sends 6-digit OTP to phone"
        - "System displays OTP entry screen"
        - "User enters 6-digit OTP and taps 'Verify OTP'"
        - "System validates OTP and displays address entry screen"
        - "User enters all address fields and taps 'Continue'"
        - "System displays password creation screen"
        - "User enters password twice and taps 'Create Account'"
        - "System creates account and logs user in"
        - "System navigates to dashboard"
      alternate_flows:
        - "A1: Google auth cancelled - User returns to signup selection"
        - "A2: Phone already registered - System shows error, user can login"
        - "A3: Wrong OTP - System shows error, user retries"
        - "A4: Weak password - System shows requirements, user re-enters"
