    test_status: pending

  - id: MVP-AUTH-007
    title: Unified Signup Flow
    priority: P0
    status: implemented
    notes: |
      Multi-step signup process with three entry points:
      
      Flow A - Email First:
      1. Signup Method Selection → Choose Email
      2. Enter Email → Send verification code
      3. Verify Email Code (6-digit)
      4. Enter Phone Number → Send OTP
      5. Verify Phone OTP (6-digit)
      6. Enter Address (mandatory)
      7. Create Password
      8. Account Created
      
      Flow B - Phone First:
      1. Signup Method Selection → Choose Phone
      2. Enter Phone → Send OTP
      3. Verify Phone OTP (6-digit)
      4. Enter Email → Send verification code
      5. Verify Email Code (6-digit)
      6. Enter Address (mandatory)
      7. Create Password
      8. Account Created
      
      Flow C - Google Signup:
      1. Signup Method Selection → Choose Google
      2. Google Sign-In (email auto-verified)
      3. Enter Phone Number → Send OTP
      4. Verify Phone OTP (6-digit)
      5. Enter Address (mandatory)
      6. Create Password
      7. Account Created
      
      Common Requirements:
      - Email: mandatory (verified via code or Google)
      - Phone: mandatory (verified via OTP)
      - Address: mandatory (all flows)
      - Password: mandatory (8+ chars, uppercase, lowercase, number, special char)
      - First Name: mandatory
      - Last Name: mandatory
    test_status: pending

