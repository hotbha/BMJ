# ============================================================
# BUSINESS STRATEGY - SUBSCRIPTION FIRST
# ============================================================
# Primary Focus: Recurring revenue through subscriptions
# Secondary: One-time orders as entry point to subscriptions
# ============================================================

business_priorities:
  Primary: |
    SUBSCRIPTIONS - 80% focus
    - Easy subscription signup
    - Multiple plan tiers (Delight, Signature, Premium)
    - Weekly & Monthly plans (monthly more cost-effective)
    - Size options (200ml, 300ml, 500ml) in all categories
    - Auto-debit convenience
    - Subscription management portal
    - Clear visualization of category + size + plan options

  Secondary: |
    ONE-TIME ORDERS - 20% focus
    - Try before subscribing
    - Gift purchases
    - Top-up orders
    - Convert to subscription after trial

# ============================================================
