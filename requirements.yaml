  - id: MVP-AUTH-001
    title: Email Login/Signup
    priority: P0
    status: implemented
    notes: |
      Unified signup flow with email-first or phone-first options:
      - Email signup: Email → Verify Email → Phone → Verify OTP → Address → Password
      - Phone signup: Phone → Verify OTP → Email → Verify Email → Address → Password
      - Google signup: Google (email verified) → Phone → Verify OTP → Address → Password
      All flows require mandatory address collection before account creation
    test_status: pending

  - id: MVP-AUTH-002
    title: Google Sign-In
    priority: P0
    status: implemented
    notes: |
      Google signup flow:
      1. User taps "Sign up with Google" button
      2. Google account selection screen opens
      3. User selects Gmail account
      4. Email, Name, and Photo fetched from Google (email pre-verified)
      5. Signup form pre-filled with Google data (READ-ONLY fields)
         - Email (readOnly: true)
         - First Name (readOnly: true)
         - Last Name (readOnly: true)
         - Photo (readOnly: true)
      6. User enters required details (EDITABLE fields)
         - Phone number (required, OTP verified)
         - Address details (required)
         - Password (required, validated)
      7. Account created with all mandatory fields
      8. Email is already verified by Google (no email verification needed)
    test_status: pending

  - id: MVP-AUTH-003
    title: Auto-login with JWT
    priority: P0
    status: implemented
    notes: Token persistence in SharedPreferences, 15-minute JWT expiration
    test_status: pending

  - id: MVP-AUTH-004
    title: Logout
    priority: P0
    status: implemented
