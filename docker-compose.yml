# ============================================================
# Docker Compose for BookMyJuice Local Development
# ============================================================
# Usage:
#   docker-compose --env-file .env up -d     # Start all services
#   docker-compose down                      # Stop all services
#   docker-compose logs -f                   # View logs
# ============================================================
# Secrets are loaded from ROOT .env file at X:\BMJ\.env (copy .env.example to .env first)
# IMPORTANT: Only ONE .env file exists — at the project root (X:\BMJ\.env).
# Do NOT create a duplicate .env inside bmjServer/ or any subdirectory.
# Running docker-compose from the project root (X:\BMJ) will automatically pick up X:\BMJ\.env
# via the relative path ./.env shown below.
# ============================================================

# version: '3.8'

services:
  # ============================================================
  # MySQL Database
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: bmj-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root_password_change_in_production}
      MYSQL_DATABASE: ${DB_NAME:-bmj_db}
      MYSQL_USER: ${DB_USERNAME:-bmj}
      MYSQL_PASSWORD: ${DB_PASSWORD:-PASS@123}
      TZ: UTC
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Mount the migration folder to a sub-folder to keep it clean
      - ./bmjServer/src/main/resources/db/migration:/docker-entrypoint-initdb.d/migration:ro
      # Mount init scripts. NOTE: if scripts/init-db.sql is a directory,
      # point to an actual .sql file inside it instead.
      # - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/99-init.sql:ro

    networks:
      - bmj-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USERNAME:-bmj}", "-p${DB_PASSWORD:-PASS@123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=200
      --innodb-buffer-pool-size=512M

  # ============================================================
  # Redis (For caching and rate limiting)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: bmj-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bmj-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ============================================================
  # Spring Boot Backend
  # ============================================================
  backend:
    build:
      context: ./bmjServer
      dockerfile: Dockerfile.dev
    container_name: bmj-backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      SPRING_PROFILES_ACTIVE: dev,docker
      # No MAVEN_OPTS needed here; remove to avoid JDWP port conflict with
      # spring-boot.run.jvmArguments below. MAVEN_OPTS attaches debugger to the
      # Maven JVM, while jvmArguments passes it to the forked Spring Boot JVM,
      # both on port 5005 => bind error.
      DB_HOSTNAME: ${DB_HOSTNAME:-mysql}
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-bmj_db}
      DB_USERNAME: ${DB_USERNAME:-bmj}
      DB_PASSWORD: ${DB_PASSWORD:-PASS@123}
      CHARGEBEE_SITE: ${CHARGEBEE_SITE:-bookmyjuice-test}
      CHARGEBEE_API_KEY: ${CHARGEBEE_API_KEY:-test_key_placeholder}
      JWT_SECRET: ${JWT_SECRET:-BookMyJuice_SecureJWT_Key_2024_Minimum32Chars}
      JWT_EXPIRATION_MS: 86400000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-support@bookmyjuice.co.in}
      SENTRY_DSN_BACKEND: ${SENTRY_DSN_BACKEND:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
      LOGGING_LEVEL: DEBUG
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
      - "5005:5005"  # Debug port (JDWP)
    volumes:
      - ./bmjServer:/app
      - ./bmjServer/logs:/app/logs
      - maven_cache:/root/.m2
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bmj-network
    # Override Dockerfile CMD to include JDWP debug agent.
    # Using exec/list form to avoid shell quoting issues with JVM args.
    command:
      - mvn
      - spring-boot:run
      - -Dspring-boot.run.jvmArguments=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005 -Xdebug
      - -Dspring-boot.run.addResources=true

  # ============================================================
  # phpMyAdmin (Database Management UI)
  # ============================================================
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: bmj-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: bmj
      PMA_PASSWORD: PASS@123
      UPLOAD_LIMIT: 100M
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - bmj-network
    profiles:
      - tools

  # ============================================================
  # Redis Commander (Redis Management UI)
  # ============================================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: bmj-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
      HTTP_USER: admin
      HTTP_PASSWORD: admin_password_change_me
    ports:
      - "8082:8081"
    depends_on:
      - redis
    networks:
      - bmj-network
    profiles:
      - tools

  # ============================================================
  # Mailhog (Email Testing - Dev Only)
  # ============================================================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: bmj-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI
    networks:
      - bmj-network
    profiles:
      - tools

networks:
  bmj-network:
    driver: bridge
    name: bookmyjuice-network

volumes:
  mysql_data:
    driver: local
    name: bmj-mysql-data
  redis_data:
    driver: local
    name: bmj-redis-data
  maven_cache:
    driver: local
    name: bmj-maven-cache

# ============================================================
# Usage Examples:
# ============================================================
# Start all services (including dev tools):
#   docker-compose --profile tools up -d
#
# Start only core services (MySQL, Redis, Backend):
#   docker-compose up -d
#
# View backend logs:
#   docker-compose logs -f backend
#
# Stop all services:
#   docker-compose down
#
# Stop and remove volumes (WARNING: deletes data):
#   docker-compose down -v
#
# Access database:
#   MySQL: localhost:3306 (user: bmj, pass: PASS@123)
#   phpMyAdmin: http://localhost:8081
#
# Access Redis:
#   localhost:6379
#   Redis Commander: http://localhost:8082 (admin/admin_password_change_me)
#
# Access Mailhog (for email testing):
#   Web UI: http://localhost:8025
#   SMTP: localhost:1025
#
# ============================================================
# Debugging from Phone (Checkpoints):
# ============================================================
# Backend debug port 5005 is already exposed. To debug your Spring Boot code
# from a physical phone:
#
# 1. Start Docker services:    docker-compose up -d
# 2. Get your machine IP:      .\ops\find_active_ip.ps1
# 3. In VS Code, use the "Docker: Attach Debugger (Backend)" launch config
#    (connects to localhost:5005 where Docker exposes JDWP)
# 4. For Flutter on phone, use the "Flutter App (Phone Debug)" launch config
#    (prompts you to enter your machine's LAN IP)
# 5. Alternatively, use compound config:
#    "Full Stack (Docker + Phone Debug)" — attaches debugger AND runs Flutter
#
# The key insight: Docker exposes port 5005 bound to 0.0.0.0 inside the
# container. VS Code's "Remote Attach" on localhost:5005 can connect to
# the Docker container's JDWP agent. Set breakpoints in any Java file
# and they will be hit when your phone makes API calls.
# ============================================================
